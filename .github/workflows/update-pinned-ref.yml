---
name: Update Pinned Ref
on:
  workflow_dispatch:
    inputs:
      repo-owner:
        description: Repository owner
        required: true
        default: nicholas-fedor
      repo-name:
        description: Repository name
        required: true
        default: govulncheck-action
      sha:
        description: Specific commit SHA to use (optional, will fetch latest if not provided)
        required: false
      readme-path:
        description: Path to README.md
        required: false
        default: README.md
  repository_dispatch:
    types: [release]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-ref:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Update README with pinned ref
        uses: ./.github/actions/update-pinned-ref
        with:
          repo-owner: ${{ github.event.inputs.repo-owner || 'nicholas-fedor' }}
          repo-name: ${{ github.event.inputs.repo-name || 'govulncheck-action' }}
          sha: ${{ github.event.inputs.sha }}
          readme-path: ${{ github.event.inputs.readme-path }}

      - name: Create branch and configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -B docs/update-pinned-ref

      - name: Commit and push changes
        run: |
          git add README.md
          git diff --staged --quiet || git commit -m "docs(readme): update pinned action ref"
          git push -u origin docs/update-pinned-ref -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create pull request
        run: |
          gh pr create --title "docs: update pinned action ref in README" --body "## Summary\n- Update README.md with latest pinned action ref"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
